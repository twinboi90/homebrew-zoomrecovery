name: Update Formula on Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.20)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate SHA256
        id: sha
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Remove leading 'v' if present
          VERSION_NUM="${VERSION#v}"
          
          # Download the tarball and calculate SHA256
          TARBALL_URL="https://github.com/twinboi90/ZoomRecovery/archive/refs/tags/${VERSION}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')
          
          echo "version=$VERSION_NUM" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "url=$TARBALL_URL" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          cat > Formula/zoomrecovery.rb <<'EOF'
          class Zoomrecovery < Formula
            desc "Fix Zoom error 1132 by clearing corrupted database files"
            homepage "https://github.com/twinboi90/ZoomRecovery"
            url "https://github.com/twinboi90/ZoomRecovery/archive/refs/tags/v${{ steps.sha.outputs.version }}.tar.gz"
            sha256 "${{ steps.sha.outputs.sha256 }}"
            license "MIT"

            depends_on :macos

            def install
              bin.install "zoomrecovery"
            end

            test do
              assert_match "zoomrecovery", shell_output("#{bin}/zoomrecovery --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zoomrecovery.rb
          git commit -m "Update zoomrecovery to ${{ steps.sha.outputs.version }}"
          git push
